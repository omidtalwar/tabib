<!doctype html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tabib Pharmacy</title>
  <meta name="robots" content="noindex" />
  <meta name="theme-color" content="#0EA59B" />
  <link rel="icon" href="../assets/icon.png" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="../assets/icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Vazirmatn:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/tailwind.css" />
</head>
<body class="min-h-screen">
  <!-- Boot/guard screen -->
  <div id="boot" class="min-h-screen grid place-items-center">
    <p class="text-sm font-semibold text-soft" data-i18n="common.loading">Loading…</p>
  </div>

  <!-- Offline banner -->
  <div id="offlineBanner" class="hidden fixed top-0 inset-x-0 z-50 bg-warn px-4 py-1.5 text-center text-sm font-semibold text-white" data-i18n="app.offlineBanner">
    You're offline. Changes are saved on this device and will sync when you reconnect.
  </div>

  <!-- App shell (revealed after guard passes) -->
  <div id="shell" class="hidden md:grid md:grid-cols-[260px_1fr] min-h-screen">
    <!-- Sidebar -->
    <aside class="border-e border-line bg-white/40 md:min-h-screen">
      <div class="side-profile">
        <div id="avatar" class="side-avatar">P</div>
        <div class="min-w-0">
          <p id="pharmacyName" class="side-name truncate">—</p>
          <p id="sideRole" class="side-email truncate">Pharmacy</p>
        </div>
      </div>
      <nav id="nav" class="flex flex-col gap-0.5 px-3 pb-4"></nav>
    </aside>

    <!-- Main -->
    <div class="flex min-h-screen flex-col">
      <header class="flex items-center justify-between gap-3 border-b border-line bg-white px-5 py-2.5">
        <h1 id="pageTitle" class="text-lg font-bold text-ink">Dashboard</h1>
        <div class="flex items-center gap-2.5">
          <div id="switcherHost"></div>
          <span id="syncDot" class="hidden items-center gap-1.5 text-xs font-semibold text-soft sm:inline-flex">
            <span class="h-2 w-2 rounded-full bg-ok"></span><span id="syncText">Online</span>
          </span>
          <div class="relative">
            <button id="userBtn" class="user-trigger" aria-haspopup="true" aria-expanded="false">
              <span id="headerAvatar" class="grid h-7 w-7 flex-none place-items-center rounded-full text-[11px] font-bold text-white" style="background-image:linear-gradient(135deg,#26b3a6,#0A7F77)">P</span>
              <span id="userEmail" class="hidden max-w-[150px] truncate text-xs font-medium text-ink sm:inline"></span>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" class="text-soft" style="width:14px;height:14px"><path d="m6 9 6 6 6-6"/></svg>
            </button>
            <div id="userMenu" class="menu hidden">
              <div class="menu-head">
                <span id="menuAvatar" class="grid h-9 w-9 flex-none place-items-center rounded-full text-sm font-bold text-white" style="background-image:linear-gradient(135deg,#26b3a6,#0A7F77)">P</span>
                <div class="min-w-0">
                  <p id="menuName" class="truncate text-sm font-semibold text-ink">—</p>
                  <p id="menuEmail" class="truncate text-xs text-soft">—</p>
                </div>
              </div>
              <div class="menu-sep"></div>
              <p class="px-2.5 pb-0.5 pt-0.5 text-[11px] font-semibold uppercase tracking-wide text-soft" data-i18n="menu.language">Language</p>
              <button class="menu-item lang-opt" data-lang="en"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a14 14 0 0 1 0 18M12 3a14 14 0 0 0 0 18"/></svg><span class="flex-1 text-start">English</span><span class="lang-check w-4 text-brand-600"></span></button>
              <button class="menu-item lang-opt" data-lang="fa"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a14 14 0 0 1 0 18M12 3a14 14 0 0 0 0 18"/></svg><span class="flex-1 text-start">دری</span><span class="lang-check w-4 text-brand-600"></span></button>
              <button class="menu-item lang-opt" data-lang="ps"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a14 14 0 0 1 0 18M12 3a14 14 0 0 0 0 18"/></svg><span class="flex-1 text-start">پښتو</span><span class="lang-check w-4 text-brand-600"></span></button>
              <div class="menu-sep"></div>
              <button id="logoutBtn" class="menu-item danger">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="m16 17 5-5-5-5"/><path d="M21 12H9"/></svg>
                <span data-i18n="menu.signOut">Sign out</span>
              </button>
            </div>
          </div>
        </div>
      </header>
      <main id="outlet" class="flex-1 space-y-5 p-5"></main>
    </div>
  </div>

  <script type="module">
    import { isConfigured } from "./assets/js/firebase.js";
    import { requirePharmacySession, logout, currentSession } from "./assets/js/session.js";
    import { startRouter, navigate, PAGES } from "./assets/js/router.js";
    import { pharmacyRef, listOwnedPharmacies, getActivePharmacy, setActivePharmacy } from "./assets/js/repo.js";
    import { initI18n, t, applyTranslations, setLocale, getLocale, LOCALE_LABELS } from "./assets/js/i18n.js";
    import { onSnapshot } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";

    // PWA: keep the installed app shell available offline.
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("./sw.js").catch((e) => console.warn("SW register failed", e));
    }

    // Windows 11 / Fluent-style nav: colored icon tile + label per page.
    const NAV = {
      dashboard:     { label: "Dashboard",     color: "#0EA59B", icon: '<rect x="4" y="4" width="7" height="7" rx="1.5"/><rect x="13" y="4" width="7" height="7" rx="1.5"/><rect x="4" y="13" width="7" height="7" rx="1.5"/><rect x="13" y="13" width="7" height="7" rx="1.5"/>' },
      drugs:         { label: "Drugs",         color: "#2F6FED", icon: '<rect x="3" y="8.5" width="18" height="7" rx="3.5"/><path d="M12 8.5v7"/>' },
      inventory:     { label: "Inventory",     color: "#F0A92C", icon: '<path d="M3 7l9-4 9 4v10l-9 4-9-4z"/><path d="M3 7l9 4 9-4M12 11v10"/>' },
      sales:         { label: "Sales (POS)",   color: "#1F9D55", icon: '<path d="M5 7h14l-1.4 9H6.4z"/><path d="M9 7V5.5a3 3 0 0 1 6 0V7"/>' },
      prescriptions: { label: "Prescriptions", color: "#7C5CFC", icon: '<rect x="5" y="3" width="14" height="18" rx="2"/><path d="M9 8h6M9 12h6M9 16h4"/>' },
      patients:      { label: "Patients",      color: "#FF6B4A", icon: '<circle cx="12" cy="8" r="3.5"/><path d="M5 20a7 7 0 0 1 14 0"/>' },
      suppliers:     { label: "Suppliers",     color: "#11B5A4", icon: '<path d="M3 6h11v9H3z"/><path d="M14 9h4l3 3v3h-7z"/><circle cx="7" cy="18" r="1.6"/><circle cx="17" cy="18" r="1.6"/>' },
      expenses:      { label: "Expenses",      color: "#E8554E", icon: '<rect x="2" y="6" width="20" height="12" rx="2"/><circle cx="12" cy="12" r="2.5"/><path d="M6 12h.01M18 12h.01"/>' },
      reports:       { label: "Reports",       color: "#3B82F6", icon: '<path d="M5 20V10M12 20V4M19 20v-7"/>' },
      settings:      { label: "Settings",      color: "#6C7B7A", icon: '<circle cx="12" cy="12" r="3.2"/><path d="M12 3v3M12 18v3M3 12h3M18 12h3M5.6 5.6l2.1 2.1M16.3 16.3l2.1 2.1M18.4 5.6l-2.1 2.1M7.7 16.3l-2.1 2.1"/>' },
    };

    function showUnlinked(email) {
      document.getElementById("boot").innerHTML = `
        <div class="card max-w-md text-center">
          <p class="text-base font-semibold text-ink">${t("app.notLinkedTitle")}</p>
          <p class="mt-1 text-sm text-soft">${t("app.notLinkedBody", { email: email ?? "This account" })}</p>
          <button id="out" class="btn-ghost mt-4">${t("menu.signOut")}</button>
        </div>`;
      document.getElementById("out").addEventListener("click", () => logout().then(() => location.replace("./index.html")));
    }

    (async function main() {
      await initI18n();
      applyTranslations(document);
      if (!isConfigured) {
        document.getElementById("boot").innerHTML =
          `<div class="card max-w-md text-center"><p class="font-semibold text-warn">${t("app.configMissing")}</p>
           <p class="mt-1 text-sm text-soft">${t("app.configMissingHint")}</p></div>`;
        return;
      }

      const session = await requirePharmacySession();
      if (session.unlinked) return showUnlinked(session.email);

      // Which pharmacies can this owner see, and which is active?
      const owned = await listOwnedPharmacies(session.uid).catch(() => []);
      const ownedIds = owned.map((o) => o.id);
      let active = getActivePharmacy();
      if (!active || !ownedIds.includes(active)) {
        active = ownedIds.includes(session.pharmacyId) ? session.pharmacyId : (owned[0]?.id || session.pharmacyId);
      }
      setActivePharmacy(active);

      // Avatars use the Google profile photo when available, else an initial.
      const email = session.email || "";
      const initial = (email[0] || "P").toUpperCase();
      const setAvatar = (id) => {
        const elm = document.getElementById(id);
        if (session.photoURL) {
          elm.textContent = "";
          elm.style.backgroundImage = `url("${session.photoURL}")`;
          elm.style.backgroundSize = "cover";
          elm.style.backgroundPosition = "center";
        } else {
          elm.textContent = initial;
        }
      };
      ["avatar", "headerAvatar", "menuAvatar"].forEach(setAvatar);
      const displayName = session.displayName || (email.split("@")[0] || "User").replace(/[._]/g, " ").replace(/\b\w/g, (c) => c.toUpperCase());
      document.getElementById("menuName").textContent = displayName;
      document.getElementById("menuEmail").textContent = email;
      document.getElementById("sideRole").textContent = t(session.role === "admin" ? "app.roleAdmin" : "app.roleStaff");

      // Build sidebar nav (colored icon tiles).
      const nav = document.getElementById("nav");
      const links = {};
      for (const page of PAGES) {
        const n = NAV[page];
        const a = document.createElement("a");
        a.href = `#/p/${active}/${page}`;
        a.className = "nav-tile";
        a.innerHTML = `<span class="nav-ico" style="background:${n.color}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${n.icon}</svg></span><span>${t("nav." + page)}</span>`;
        nav.append(a);
        links[page] = a;
      }

      // Pharmacy switcher chip in the header: shop icon + name (dropdown if >1).
      {
        const wrap = document.createElement("div");
        wrap.className = "switcher";
        wrap.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7l1.2-3.2A1 1 0 0 1 5.1 3h13.8a1 1 0 0 1 .9.8L21 7"/><path d="M4 7v12a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1V7"/><path d="M3 7h18"/><path d="M9 20v-6h6v6"/></svg>';
        const activeName = (owned.find((o) => o.id === active) || {}).name || "Pharmacy";
        if (owned.length > 1) {
          const sel = document.createElement("select");
          sel.className = "switch-select";
          sel.setAttribute("aria-label", "Active pharmacy");
          for (const o of owned) {
            const opt = document.createElement("option");
            opt.value = o.id; opt.textContent = o.name;
            if (o.id === active) opt.selected = true;
            sel.append(opt);
          }
          sel.addEventListener("change", () => { setActivePharmacy(sel.value); location.reload(); });
          wrap.append(sel);
          const chev = document.createElement("span");
          chev.className = "flex-none text-soft";
          chev.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="width:13px;height:13px"><path d="m6 9 6 6 6-6"/></svg>';
          wrap.append(chev);
        } else {
          const span = document.createElement("span");
          span.className = "max-w-[170px] truncate text-sm font-semibold text-ink";
          span.textContent = activeName;
          wrap.append(span);
        }
        document.getElementById("switcherHost").append(wrap);
      }

      document.getElementById("userEmail").textContent = session.email || "";
      document.getElementById("logoutBtn").addEventListener("click", () =>
        logout().then(() => location.replace("./index.html")));

      // Header user menu (open/close).
      const userBtn = document.getElementById("userBtn");
      const userMenu = document.getElementById("userMenu");
      userBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        const hidden = userMenu.classList.toggle("hidden");
        userBtn.setAttribute("aria-expanded", hidden ? "false" : "true");
      });
      document.addEventListener("click", (e) => {
        if (!userMenu.contains(e.target) && !userBtn.contains(e.target)) userMenu.classList.add("hidden");
      });
      document.addEventListener("keydown", (e) => { if (e.key === "Escape") userMenu.classList.add("hidden"); });

      // Language menu — switching reloads in the chosen language (and direction).
      document.querySelectorAll(".lang-opt").forEach((b) => {
        if (b.getAttribute("data-lang") === getLocale()) b.querySelector(".lang-check").textContent = "✓";
        b.addEventListener("click", (e) => { e.stopPropagation(); setLocale(b.getAttribute("data-lang")); });
      });

      // Reveal shell
      document.getElementById("boot").classList.add("hidden");
      document.getElementById("shell").classList.remove("hidden");

      // Live name of the ACTIVE pharmacy.
      onSnapshot(pharmacyRef(active), (snap) => {
        const d = snap.data() || {};
        document.getElementById("pharmacyName").textContent = d.name || d.pharmacyName || active;
      }, () => {});

      // Online/offline indicator + banner
      const banner = document.getElementById("offlineBanner");
      const dot = document.querySelector("#syncDot span");
      const txt = document.getElementById("syncText");
      function setOnline(on) {
        banner.classList.toggle("hidden", on);
        dot.className = `h-2 w-2 rounded-full ${on ? "bg-ok" : "bg-warn"}`;
        txt.textContent = on ? t("app.online") : t("app.offline");
      }
      setOnline(navigator.onLine);
      addEventListener("online", () => setOnline(true));
      addEventListener("offline", () => setOnline(false));

      // Router
      startRouter({
        outlet: document.getElementById("outlet"),
        session,
        pharmacyId: active,
        onNavigate: (page) => {
          for (const [p, a] of Object.entries(links)) a.classList.toggle("active", p === page);
          document.getElementById("pageTitle").textContent = t("nav." + page);
        },
      });
    })();
  </script>
</body>
</html>
