<!doctype html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — Tabib Pharmacy</title>
  <meta name="robots" content="noindex" />
  <meta name="theme-color" content="#0EA59B" />
  <link rel="icon" href="../assets/icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Vazirmatn:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/tailwind.css" />
</head>
<body class="min-h-screen grid place-items-center p-4">
  <main class="w-full max-w-sm">
    <div class="mb-6 flex flex-col items-center text-center">
      <img src="../assets/icon.png" alt="" class="h-14 w-14 rounded-2xl shadow" />
      <h1 class="mt-3 text-xl font-bold text-ink">Tabib Pharmacy</h1>
      <p class="text-sm text-soft">Sign in to manage your pharmacy.</p>
    </div>

    <form id="loginForm" class="card flex flex-col gap-4" novalidate>
      <div id="config-warning" class="hidden rounded-xl bg-warn/10 px-3 py-2 text-sm font-semibold text-warn">
        Firebase config not set yet. Add your web config in <code>assets/js/firebase.js</code>.
      </div>

      <div>
        <label class="label" for="email">Email</label>
        <input class="field" id="email" type="email" autocomplete="username" required />
      </div>

      <div>
        <label class="label" for="password">Password</label>
        <input class="field" id="password" type="password" autocomplete="current-password" required />
      </div>

      <label class="flex items-center gap-2 text-sm text-ink">
        <input id="remember" type="checkbox" checked class="h-4 w-4 rounded border-line text-brand-500" />
        Remember me on this device
      </label>

      <p id="error" class="hidden text-sm font-semibold text-danger" role="alert"></p>

      <button id="submitBtn" type="submit" class="btn-primary w-full">Sign in</button>

      <button id="resetBtn" type="button" class="text-sm font-semibold text-brand-700 hover:text-brand-800">
        Forgot your password?
      </button>

      <div class="flex items-center gap-3 py-1">
        <span class="h-px flex-1 bg-line"></span>
        <span class="text-xs font-semibold text-soft">or</span>
        <span class="h-px flex-1 bg-line"></span>
      </div>

      <button id="googleBtn" type="button" class="btn-ghost w-full">
        <svg width="18" height="18" viewBox="0 0 18 18" aria-hidden="true">
          <path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.8 2.72v2.26h2.92c1.7-1.57 2.68-3.88 2.68-6.62z"/>
          <path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.92-2.26c-.8.54-1.84.86-3.04.86-2.34 0-4.32-1.58-5.03-3.7H.96v2.33A9 9 0 0 0 9 18z"/>
          <path fill="#FBBC05" d="M3.97 10.72a5.4 5.4 0 0 1 0-3.44V4.95H.96a9 9 0 0 0 0 8.1l3.01-2.33z"/>
          <path fill="#EA4335" d="M9 3.58c1.32 0 2.5.46 3.44 1.35l2.58-2.58A9 9 0 0 0 .96 4.95l3.01 2.33C4.68 5.16 6.66 3.58 9 3.58z"/>
        </svg>
        Continue with Google
      </button>
    </form>

    <p class="mt-6 text-center text-xs text-soft">
      Pharmacy staff only. Access is granted by your pharmacy admin.
    </p>
  </main>

  <script type="module">
    import { isConfigured } from "./assets/js/firebase.js";
    import { login, loginWithGoogle, resetPassword, onSession } from "./assets/js/session.js";
    import { toast } from "./assets/js/ui.js";

    const form = document.getElementById("loginForm");
    const errorEl = document.getElementById("error");
    const btn = document.getElementById("submitBtn");

    if (!isConfigured) document.getElementById("config-warning").classList.remove("hidden");

    // Signed in → go to the app. app.html handles the "account not linked"
    // case (signed in but no pharmacyId claim) with a clear message, so we
    // redirect on any authenticated session, not only linked ones.
    onSession((s) => { if (s) location.replace("./app.html"); });

    function showError(msg) { errorEl.textContent = msg; errorEl.classList.remove("hidden"); }
    function clearError() { errorEl.classList.add("hidden"); }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      clearError();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const remember = document.getElementById("remember").checked;
      if (!email || !password) return showError("Enter your email and password.");

      btn.disabled = true; btn.textContent = "Signing in…";
      try {
        await login(email, password, remember);
        // onSession handles the redirect once claims load.
      } catch (err) {
        const map = {
          "auth/invalid-credential": "Wrong email or password.",
          "auth/invalid-email": "That email address isn't valid.",
          "auth/user-disabled": "This account is disabled. Contact your admin.",
          "auth/too-many-requests": "Too many attempts. Wait a moment and try again.",
          "auth/network-request-failed": "No connection. Check your network and try again.",
        };
        showError(map[err.code] || "Couldn't sign you in. Try again.");
        btn.disabled = false; btn.textContent = "Sign in";
      }
    });

    document.getElementById("googleBtn").addEventListener("click", async () => {
      clearError();
      const remember = document.getElementById("remember").checked;
      const gbtn = document.getElementById("googleBtn");
      gbtn.disabled = true;
      try {
        await loginWithGoogle(remember);
        // onSession handles the redirect once claims load.
      } catch (err) {
        const map = {
          "auth/popup-closed-by-user": "Sign-in was cancelled.",
          "auth/popup-blocked": "Your browser blocked the popup. Allow popups and try again.",
          "auth/unauthorized-domain": "This domain isn't authorized for Google sign-in yet.",
          "auth/network-request-failed": "No connection. Check your network and try again.",
        };
        showError(map[err.code] || "Couldn't sign in with Google. Try again.");
        gbtn.disabled = false;
      }
    });

    document.getElementById("resetBtn").addEventListener("click", async () => {
      const email = document.getElementById("email").value.trim();
      if (!email) return showError("Enter your email first, then tap reset.");
      try {
        await resetPassword(email);
        toast("Password reset email sent. Check your inbox.", { type: "ok" });
      } catch {
        showError("Couldn't send the reset email. Check the address.");
      }
    });
  </script>
</body>
</html>
